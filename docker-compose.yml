version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: e-kinerja-postgres
    environment:
      POSTGRES_DB: e_kinerja_terpadu
      POSTGRES_USER: e_kinerja
      POSTGRES_PASSWORD: secure_password_123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - e-kinerja-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U e_kinerja"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: e-kinerja-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - e-kinerja-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO S3 Storage
  minio:
    image: minio/minio:latest
    container_name: e-kinerja-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/minio_data
    networks:
      - e-kinerja-network
    command: server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Laravel Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: e-kinerja-backend
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=e_kinerja_terpadu
      - DB_USERNAME=e_kinerja
      - DB_PASSWORD=secure_password_123
      - CACHE_DRIVER=redis
      - REDIS_HOST=redis
      - REDIS_PASSWORD=null
      - REDIS_PORT=6379
      - FILESYSTEM_DISK=s3
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin123
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_BUCKET=e-kinerja
      - AWS_URL=http://minio:9000
      - AWS_ENDPOINT=http://minio:9000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    networks:
      - e-kinerja-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: php artisan serve --host=0.0.0.0 --port=8000

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: e-kinerja-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
      - NEXT_PUBLIC_APP_NAME=e-Kinerja Terpadu
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    networks:
      - e-kinerja-network
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  e-kinerja-network:
    driver: bridge
